<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Greeting Section -->
    <section class="greeting-section">
        <div class="date-time">
            <p id="current-date" class="date"></p>
            <p id="current-time" class="time"></p>
        </div>
        <h1 id="greeting-message" class="greeting"></h1>
    </section>

    <!-- Pomodoro Timer -->
    <section class="pomodoro-section">
        <h2>Pomodoro Timer</h2>
        <div class="timer-display">
            <span id="timer-display">25:00</span>
        </div>
        <div class="timer-controls">
            <button id="start-btn" class="btn btn-start">Start</button>
            <button id="stop-btn" class="btn btn-stop">Stop</button>
            <button id="reset-btn" class="btn btn-reset">Reset</button>
        </div>
    </section>

    <!-- Task List -->
    <section class="task-section">
        <h2>Task List</h2>
        <div class="task-input-container">
            <input type="text" id="task-input" class="task-input" placeholder="Add a new task...">
            <button id="add-task-btn" class="btn btn-add">Add Task</button>
        </div>
        <ul id="task-list" class="task-list"></ul>
    </section>

    <!-- Quick Links -->
    <section class="links-section">
        <h2>Quick Links</h2>
        <div class="link-input-container">
            <input type="text" id="link-name-input" class="link-input" placeholder="Link name...">
            <input type="url" id="link-url-input" class="link-input" placeholder="URL...">
            <button id="add-link-btn" class="btn btn-add">Add Link</button>
        </div>
        <div id="links-container" class="links-container"></div>
    </section>

    <script src="js/app.js"></script>
</body>
</html>
